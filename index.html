<script>
const MONTHS = ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
const SHEET_ID = '1r0bIlNZ4NzrXnN7d8hea5-e9axrg5aYnhUJ_8E0GVS4';
const GID      = '2046388932';
const GID_BOOST= '1167405424';
const URL       = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=tsv&gid=${GID}`;
const URL_BOOST = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=tsv&gid=${GID_BOOST}`;

let allData = [], boosterData = [], activeVoeding = new Set(), currentView = 'cards';
let activePlantFilter = null; // voor booster→plant koppeling

function parseTSV(text, vereistVeld=null) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split('\t').map(h => h.trim().replace(/[\r\n]+/g,' ').replace(/\s+/g,' ').replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = line.split('\t'), obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i]||'').trim().replace(/^"|"$/g,''));
    return obj;
  }).filter(r => Object.values(r).some(v => v) && (!vereistVeld || r[vereistVeld]));
}

function monthRange(from, to) {
  from = parseInt(from); to = parseInt(to);
  if (isNaN(from)) return [];
  if (isNaN(to)) return [from];
  const ms = []; let m = from;
  while (true) { ms.push(m); if (m===to) break; m = m%12+1; if (ms.length>12) break; }
  return ms;
}
function mName(n) { return MONTHS[(parseInt(n)-1+12)%12]||'?'; }
function pills(months, cls) {
  if (!months.length) return '<span class="m-pill none">—</span>';
  return months.map(m=>`<span class="m-pill ${cls}">${mName(m)}</span>`).join('');
}
function getMonths(p) {
  return {
    binnen: monthRange(p['Zaai Binnen'], p['Bi tm']),
    buiten: monthRange(p['Zaai Buiten'], p['bu tm']),
    oogst:  monthRange(p['Oogst vanaf'], p['oogst tm'])
  };
}
function stripStars(s) { return (s||'').replace(/\*\*/g,'').trim(); }

function getCol(p, ...candidates) {
  for (const key of Object.keys(p)) {
    const clean = key.trim().replace(/[\r\n]+/g,' ').replace(/\s+/g,' ').replace(/^"|"$/g,'').toLowerCase();
    for (const c of candidates) {
      if (clean === c.trim().replace(/[\r\n]+/g,' ').replace(/\s+/g,' ').toLowerCase()) return (p[key]||'').trim();
    }
  }
  return '';
}

function voedingStatus(val) {
  if (val==='✅') return 'yes';
  if (val==='⚠️') return 'warn';
  if (val==='❌') return 'no';
  return null;
}
function voedingChips(p) {
  const items = [
    [['Compost'],'Compost'],
    [['thee','"thee"'],'Plantenthee'],
    [['Koffiedik'],'Koffiedik'],
    [['Eierschalen'],'Eierschalen'],
    [['Houtas'],'Houtas'],
  ];
  return items.map(([keys,label]) => {
    const s = voedingStatus(getCol(p,...keys));
    if (!s) return '';
    return `<span class="v-chip ${s}">${s==='yes'?'✅':s==='warn'?'⚠️':'❌'} ${label}</span>`;
  }).join('');
}

function phColor(ph) {
  const mid = (ph.min + ph.max) / 2;
  if (mid <= 5)   return { bg:'#e53935', text:'#fff', label:'Sterk Zuur' };
  if (mid <= 6)   return { bg:'#e8b84b', text:'#3b2a1a', label:'Licht Zuur' };
  if (mid <= 7.5) return { bg:'#43a047', text:'#fff', label:'Neutraal' };
  if (mid <= 8.5) return { bg:'#26c6da', text:'#fff', label:'Licht Basisch' };
  return                  { bg:'#3949ab', text:'#fff', label:'Sterk Basisch' };
}
function phBadge(ph, large=false) {
  if (!ph) return '';
  const c = phColor(ph);
  const sz = large ? 'font-size:1rem;padding:5px 14px' : 'font-size:0.75rem;padding:2px 8px';
  return `<span class="ph-badge" style="background:${c.bg};color:${c.text};${sz}" title="${c.label}">pH ${ph.label}</span>`;
}
function parsePH(s) {
  if (!s) return null;
  const parts = s.replace(',','.').split(/[-–]/);
  const a = parseFloat(parts[0]), b = parseFloat(parts[1]);
  if (isNaN(a)) return null;
  return { min: a, max: isNaN(b)?a:b, label: isNaN(b)?`${a}`:`${a}–${b}` };
}
function parseCompanion(s) {
  if (!s) return null;
  s = s.replace(/\*\*/g,'');
  const parts = s.split(/<br\s*\/?>/i);
  let family = '', plants = [];
  parts.forEach(part => {
    part = part.trim();
    if (part.toLowerCase().startsWith('familie:')) family = part.replace(/familie:/i,'').trim();
    else if (part) plants = part.split(/[,;]+/).map(x=>x.trim()).filter(Boolean);
  });
  return { family, plants };
}

function isAlg(p) { return /^Alg[.,]/i.test((p['Naam NL']||'').trim()); }

function makeCard(p) {
  const m = getMonths(p), ph = parsePH(p['pH']), grond = p['Grondtype']||'';
  const alg = isAlg(p);
  const beschr = (p['Beschrijving ']||p['Beschrijving']||'').trim();
  return `<div class="plant-card${alg?' alg-card':''}" onclick="openModal(this)" data-plant='${JSON.stringify(p).replace(/'/g,"&#39;")}'>
    <div class="card-name">${stripStars(p['Naam NL'])}</div>
    ${alg && beschr ? `<div style="font-size:0.83rem;color:var(--muted);line-height:1.5;margin:4px 0 6px">${beschr}</div>` : ''}
    ${!alg && m.binnen.length ? `<div class="card-section"><div class="card-section-label">🏠 Zaai Binnen</div><div class="m-pills">${pills(m.binnen,'binnen')}</div></div>` : ''}
    ${!alg && m.buiten.length ? `<div class="card-section"><div class="card-section-label">☀️ Zaai Buiten</div><div class="m-pills">${pills(m.buiten,'buiten')}</div></div>` : ''}
    ${!alg && m.oogst.length  ? `<div class="card-section"><div class="card-section-label">🥬 Oogst</div><div class="m-pills">${pills(m.oogst,'oogst')}</div></div>` : ''}
    <div class="card-section"><div class="card-section-label">🌱 Voeding</div><div class="voeding-row">${voedingChips(p)||'<span style="font-size:0.78rem;color:var(--muted)">—</span>'}</div></div>
    ${ph||grond ? `<div class="card-section" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">${ph?phBadge(ph):''}${grond?`<span class="grond-badge">🪱 ${grond}</span>`:''}</div>` : ''}
  </div>`;
}

function renderCards(data) {
  if (!data.length) return '<div class="state-msg"><div class="icon">🔍</div>Geen planten gevonden</div>';
  const normal = data.filter(p => !isAlg(p));
  const alg    = data.filter(p =>  isAlg(p));
  let html = `<div class="cards-grid">${normal.map(makeCard).join('')}</div>`;
  if (alg.length) {
    html += `<div class="alg-section-header">📋 Algemeen (${alg.length})</div>`;
    html += `<div class="cards-grid">${alg.map(makeCard).join('')}</div>`;
  }
  return html;
}

function boosterIcon(naam) {
  const n = (naam||'').toLowerCase();
  if (n.includes('banaan'))    return '🍌';
  if (n.includes('koffie'))    return '☕';
  if (n.includes('thee'))      return '🍵';
  if (n.includes('compost'))   return '♻️';
  if (n.includes('eier'))      return '🥚';
  if (n.includes('hout') || n.includes('as')) return '🪵';
  if (n.includes('gras'))      return '🌿';
  if (n.includes('nering') || n.includes('mest')) return '💩';
  return '🌱';
}

function renderBoosters() {
  const q = document.getElementById('searchBooster').value.toLowerCase();
  let data = boosterData.filter(b => {
    if (!q) return true;
    return (b['Booster']||'').toLowerCase().includes(q) ||
           (b['Voedingsstof Werking']||'').toLowerCase().includes(q) ||
           (b['voor welke Planten']||'').toLowerCase().includes(q);
  });
  if (!data.length) {
    document.getElementById('boosterContent').innerHTML = '<div class="state-msg"><div class="icon">🔍</div>Geen boosters gevonden</div>';
    return;
  }
  document.getElementById('boosterContent').innerHTML = `<div class="cards-grid">${data.map(b => {
    const naam = stripStars(b['Booster']||'');
    const werking = b['Voedingsstof Werking']||'';
    const voordeel = b['Voordeel Plant']||'';
    const planten = (b['voor welke Planten']||'').split(/[,;]+/).map(s=>stripStars(s).trim()).filter(Boolean);
    const tip = b['Toepassingstip']||'';
    const icon = boosterIcon(naam);
    const plantTags = planten.map(pl =>
      `<span class="plant-tag" onclick="filterPlantenOpBooster('${pl.replace(/'/g,"&#39;")}',event)">${pl}</span>`
    ).join('');
    return `<div class="booster-card" data-booster='${JSON.stringify(b).replace(/'/g,"&#39;")}'>
      <div class="booster-header">
        <div class="booster-icon">${icon}</div>
        <div class="booster-name">${naam}</div>
      </div>
      ${werking ? `<div class="booster-section"><div class="booster-section-label">💊 Voedingsstof</div><div class="booster-text">${werking}</div></div>` : ''}
      ${voordeel ? `<div class="booster-section"><div class="booster-section-label">✅ Voordeel</div><div class="booster-text">${voordeel}</div></div>` : ''}
      ${planten.length ? `<div class="booster-section"><div class="booster-section-label">🌿 Geschikt voor</div><div style="margin-top:4px">${plantTags}</div></div>` : ''}
      ${tip ? `<div class="booster-section"><div class="booster-section-label">💡 Toepassingstip</div><div class="booster-text">${tip}</div></div>` : ''}
    </div>`;
  }).join('')}</div>`;
}

function filterPlantenOpBooster(plantnaam, event) {
  event.stopPropagation();
  activePlantFilter = plantnaam;
  // switch naar planten tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="planten"]').classList.add('active');
  ['planten','voeding','ph','kalender','boosters'].forEach(id =>
    document.getElementById('tab-'+id).style.display = id==='planten' ? '' : 'none'
  );
  // zet zoekbalk
  document.getElementById('searchPlanten').value = plantnaam;
  renderPlanten();
}

function renderTable(data) {
  if (!data.length) return '<div class="state-msg"><div class="icon">🔍</div>Geen planten gevonden</div>';
  const fmt = arr => arr.length ? arr.map(mName).join(', ') : '—';
  return `<div class="table-wrap"><table>
    <thead><tr><th>Naam</th><th>Zaai Binnen</th><th>Zaai Buiten</th><th>Oogst</th><th>pH</th><th>Grond</th><th>Voeding</th></tr></thead>
    <tbody>${data.map(p => {
      const m = getMonths(p), ph = parsePH(p['pH']);
      return `<tr onclick="openModal(this)" data-plant='${JSON.stringify(p).replace(/'/g,"&#39;")}'>
        <td style="font-weight:600">${stripStars(p['Naam NL'])}</td>
        <td style="font-size:0.8rem;color:var(--muted)">${fmt(m.binnen)}</td>
        <td style="font-size:0.8rem;color:var(--muted)">${fmt(m.buiten)}</td>
        <td style="font-size:0.8rem;color:var(--muted)">${fmt(m.oogst)}</td>
        <td>${ph?phBadge(ph):'—'}</td>
        <td style="font-size:0.78rem;color:var(--muted)">${p['Grondtype']||'—'}</td>
        <td><div class="voeding-row">${voedingChips(p)||'—'}</div></td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
}

function renderVoeding() {
  const q = document.getElementById('searchVoeding').value.toLowerCase();
  const data = allData.filter(p => {
    if (q && !stripStars(p['Naam NL']).toLowerCase().includes(q)) return false;
    for (const key of activeVoeding) {
      const keys = key==='thee' ? ['thee','"thee"'] : [key];
      if (getCol(p,...keys) !== '✅') return false;
    }
    return true;
  });
  if (!data.length) { document.getElementById('voedingContent').innerHTML = '<div class="state-msg"><div class="icon">🔍</div>Geen resultaten</div>'; return; }
  document.getElementById('voedingContent').innerHTML = data.map(p =>
    `<div class="plant-card" style="margin-bottom:10px" onclick="openModal(this)" data-plant='${JSON.stringify(p).replace(/'/g,"&#39;")}'>
      <div class="card-name">${stripStars(p['Naam NL'])}</div>
      <div class="voeding-row" style="margin-top:6px">${voedingChips(p)||'—'}</div>
    </div>`
  ).join('');
}

function renderPH() {
  const q = document.getElementById('searchPH').value.toLowerCase();
  const data = allData.filter(p => parsePH(p['pH'])).filter(p => !q || stripStars(p['Naam NL']).toLowerCase().includes(q))
    .sort((a,b) => (parsePH(a['pH'])?.min||0) - (parsePH(b['pH'])?.min||0));
  if (!data.length) { document.getElementById('phContent').innerHTML = '<div class="state-msg"><div class="icon">🔍</div>Geen resultaten</div>'; return; }
  document.getElementById('phContent').innerHTML = `<div style="border-radius:12px;border:1.5px solid var(--border);overflow:hidden">${
    data.map(p => {
      const ph = parsePH(p['pH']), c = phColor(ph);
      const left = ((ph.min-3.5)/10.5*100).toFixed(1), width = (((ph.max-ph.min)/10.5)*100+2).toFixed(1);
      return `<div class="ph-list-item" onclick="openModal(this)" data-plant='${JSON.stringify(p).replace(/'/g,"&#39;")}'>
        <div class="ph-name">${stripStars(p['Naam NL'])}</div>
        <div class="ph-bar-wrap"><div class="ph-bar" style="left:${left}%;width:${width}%;background:${c.bg}"></div></div>
        <div class="ph-val" style="color:${c.bg}">pH ${ph.label}</div>
      </div>`;
    }).join('')
  }</div>`;
}

function renderKalender() {
  const q = document.getElementById('searchKal').value.toLowerCase();
  const data = allData.filter(p => !q || stripStars(p['Naam NL']).toLowerCase().includes(q));
  if (!data.length) { document.getElementById('kalenderContent').innerHTML = '<div class="state-msg"><div class="icon">🔍</div>Geen resultaten</div>'; return; }
  document.getElementById('kalenderContent').innerHTML = `
    <div class="cal-legend">
      <span><span class="legend-dot" style="background:var(--moss)"></span>Zaai Binnen</span>
      <span><span class="legend-dot" style="background:var(--sun)"></span>Zaai Buiten</span>
      <span><span class="legend-dot" style="background:var(--bark)"></span>Oogst</span>
    </div>
    <div class="cal-wrap"><table class="cal-table">
      <thead><tr><th>Plant</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}</tr></thead>
      <tbody>${data.map(p => {
        const m = getMonths(p);
        return `<tr onclick="openModal(this)" data-plant='${JSON.stringify(p).replace(/'/g,"&#39;")}'>
          <td>${stripStars(p['Naam NL'])}</td>
          ${MONTHS.map((_,i) => {
            const mn=i+1;
            let cls = m.oogst.includes(mn)?'oogst':m.buiten.includes(mn)?'buiten':m.binnen.includes(mn)?'binnen':'';
            return `<td><div class="cal-dot ${cls}"></div></td>`;
          }).join('')}
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
}

function filterPlanten() {
  const q = document.getElementById('searchPlanten').value.toLowerCase();
  const fB = document.getElementById('filterBinnen').value;
  const fBu = document.getElementById('filterBuiten').value;
  const fO = document.getElementById('filterOogst').value;
  const fG = document.getElementById('filterGrond').value;
  return allData.filter(p => {
    if (q && !stripStars(p['Naam NL']).toLowerCase().includes(q)) return false;
    const m = getMonths(p);
    if (fB  && !m.binnen.map(String).includes(fB))  return false;
    if (fBu && !m.buiten.map(String).includes(fBu)) return false;
    if (fO  && !m.oogst.map(String).includes(fO))   return false;
    if (fG  && !(p['Grondtype']||'').toLowerCase().includes(fG.toLowerCase())) return false;
    return true;
  });
}
function renderPlanten() {
  const data = filterPlanten();
  document.getElementById('resultCount').textContent = `${data.length} planten`;
  document.getElementById('plantenContent').innerHTML = currentView==='cards' ? renderCards(data) : renderTable(data);
}

function populateFilters() {
  const binnen=new Set(), buiten=new Set(), oogst=new Set(), grond=new Set();
  allData.forEach(p => {
    const m = getMonths(p);
    m.binnen.forEach(x=>binnen.add(x)); m.buiten.forEach(x=>buiten.add(x)); m.oogst.forEach(x=>oogst.add(x));
    if (p['Grondtype']) p['Grondtype'].split(/[,;\/]+/).forEach(g=>grond.add(g.trim()));
  });
  const fillMonth = (id, set) => {
    const sel = document.getElementById(id);
    [...set].sort((a,b)=>a-b).forEach(m => { const o=document.createElement('option'); o.value=m; o.textContent=mName(m); sel.appendChild(o); });
  };
  fillMonth('filterBinnen',binnen); fillMonth('filterBuiten',buiten); fillMonth('filterOogst',oogst);
  const gs = document.getElementById('filterGrond');
  [...grond].sort().forEach(g => { const o=document.createElement('option'); o.value=g; o.textContent=g; gs.appendChild(o); });
}

function openModal(el) {
  const p = JSON.parse(el.dataset.plant.replace(/&#39;/g,"'"));
  const m = getMonths(p), ph = parsePH(p['pH']);
  const comp = parseCompanion(getCol(p,'Companion Plants'));
  const nietNa   = getCol(p,'Niet na  (jaar ervoor)','Niet na (jaar ervoor)').replace(/\*\*/g,'').trim();
  const nietVoor = getCol(p,'Niet voor (jaar erna)').replace(/\*\*/g,'').trim();
  const beschr   = (p['Beschrijving ']||p['Beschrijving']||'').trim();

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-name">${stripStars(p['Naam NL'])}</div>
    <div class="modal-section">
      <div class="modal-section-title">📅 Zaai & Oogst</div>
      <div class="modal-row">
        ${m.binnen.length?`<div class="modal-block"><div class="modal-block-label">🏠 Zaai Binnen</div><div class="m-pills">${pills(m.binnen,'binnen')}</div></div>`:''}
        ${m.buiten.length?`<div class="modal-block"><div class="modal-block-label">☀️ Zaai Buiten</div><div class="m-pills">${pills(m.buiten,'buiten')}</div></div>`:''}
        ${m.oogst.length ?`<div class="modal-block"><div class="modal-block-label">🥬 Oogst</div><div class="m-pills">${pills(m.oogst,'oogst')}</div></div>`:''}
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">🌱 Plantvoeding</div>
      <div class="modal-block"><div class="voeding-row">${voedingChips(p)||'<span style="color:var(--muted)">—</span>'}</div></div>
    </div>
    ${ph||p['Grondtype']?`<div class="modal-section">
      <div class="modal-section-title">🪱 Bodem</div>
      <div class="modal-row">
        ${ph?`<div class="modal-block"><div class="modal-block-label">Zuurgraad (pH)</div><div class="modal-block-value">${phBadge(ph,true)}<span style="font-size:0.75rem;color:var(--muted);margin-left:8px">${phColor(ph).label}</span></div></div>`:''}
        ${p['Grondtype']?`<div class="modal-block"><div class="modal-block-label">Grondtype</div><div class="modal-block-value" style="font-size:0.9rem">${p['Grondtype']}</div></div>`:''}
      </div>
    </div>`:''}
    ${comp&&(comp.plants.length||comp.family)?`<div class="modal-section">
      <div class="modal-section-title">🤝 Goede Buren</div>
      <div class="modal-block">
        ${comp.family?`<div class="companion-family">Familie: ${comp.family}</div>`:''}
        ${comp.plants.length?`<div class="companion-tags">${comp.plants.map(pl=>`<span class="companion-tag">${pl}</span>`).join('')}</div>`:''}
      </div>
    </div>`:''}
    ${nietNa||nietVoor?`<div class="modal-section">
      <div class="modal-section-title">🔄 Wisselgewas</div>
      ${nietNa?`<div style="margin-bottom:6px"><div style="font-size:0.72rem;color:var(--muted);font-weight:700;margin-bottom:4px">NIET NA (jaar ervoor)</div>${nietNa.split(/[,;]+/).map(s=>`<span class="warn-tag">⚠️ ${s.trim()}</span>`).join('')}</div>`:''}
      ${nietVoor?`<div><div style="font-size:0.72rem;color:var(--muted);font-weight:700;margin-bottom:4px">NIET VOOR (jaar erna)</div>${nietVoor.split(/[,;]+/).map(s=>`<span class="warn-tag">⚠️ ${s.trim()}</span>`).join('')}</div>`:''}
    </div>`:''}
    ${beschr?`<div class="modal-section"><div class="modal-section-title">📖 Beschrijving</div><div class="modal-block modal-desc">${beschr}</div></div>`:''}
    ${p['link']?`<a class="modal-link" href="${p['link']}" target="_blank">🔗 Meer informatie</a>`:''}
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalClose').onclick = () => document.getElementById('modalOverlay').classList.remove('open');
document.getElementById('modalOverlay').onclick = e => { if (e.target===e.currentTarget) document.getElementById('modalOverlay').classList.remove('open'); };

document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active');
  ['planten','voeding','ph','kalender','boosters'].forEach(id => document.getElementById('tab-'+id).style.display = tab.dataset.tab===id?'':'none');
}));
document.querySelectorAll('.view-btn').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  currentView = btn.dataset.view; renderPlanten();
}));

document.getElementById('searchPlanten').addEventListener('input', renderPlanten);
document.getElementById('filterBinnen').addEventListener('change', renderPlanten);
document.getElementById('filterBuiten').addEventListener('change', renderPlanten);
document.getElementById('filterOogst').addEventListener('change', renderPlanten);
document.getElementById('filterGrond').addEventListener('change', renderPlanten);
document.getElementById('searchVoeding').addEventListener('input', renderVoeding);
document.getElementById('searchPH').addEventListener('input', renderPH);
document.getElementById('searchBooster').addEventListener('input', renderBoosters);
document.getElementById('searchKal').addEventListener('input', renderKalender);

document.querySelectorAll('.vf-btn').forEach(btn => btn.addEventListener('click', () => {
  const key = btn.dataset.voeding;
  if (activeVoeding.has(key)) { activeVoeding.delete(key); btn.classList.remove('active'); }
  else { activeVoeding.add(key); btn.classList.add('active'); }
  renderVoeding();
}));

document.getElementById('themeBtn').addEventListener('click', () => {
  const dark = document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme', dark?'light':'dark');
  document.getElementById('themeBtn').textContent = dark?'🌙':'☀️';
});

async function init() {
  try {
    const res = await fetch(URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allData = parseTSV(await res.text(), 'Naam NL');
    populateFilters(); renderPlanten(); renderVoeding(); renderPH(); renderKalender();
  } catch(e) {
    const msg = `<div class="state-msg"><div class="icon">⚠️</div>Kon data niet laden.<br><small>${e.message}</small><br><br><small>Controleer of het sheet openbaar is</small></div>`;
    ['plantenContent','voedingContent','phContent','kalenderContent'].forEach(id => document.getElementById(id).innerHTML = msg);
  }
  try {
    const res2 = await fetch(URL_BOOST);
    if (!res2.ok) throw new Error(`HTTP ${res2.status}`);
    const txt2 = await res2.text();
    console.log('Booster TSV eerste 200 tekens:', txt2.substring(0,200));
    boosterData = parseTSV(txt2, 'Booster');
    console.log('Boosters geladen:', boosterData.length, 'rijen');
    console.log('Eerste booster:', JSON.stringify(boosterData[0]));
    renderBoosters();
  } catch(e) {
    console.error('Booster fout:', e);
    document.getElementById('boosterContent').innerHTML =
      `<div class="state-msg"><div class="icon">⚠️</div>Kon booster-data niet laden.<br><small>${e.message}</small></div>`;
  }
}
init();
